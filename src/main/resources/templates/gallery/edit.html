<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Photo</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=1)}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">Photo Gallery</a>
</nav>

<div class="page-sm">

    <a th:href="@{/view/{id}(id=${photo.id})}" class="back-link">&larr; Back to photo</a>

    <div class="page-header">
        <h1 class="page-title">Edit Photo</h1>
    </div>

    <div class="card" style="margin-bottom: 20px">
        <img th:src="${photo.imageUrl}" th:alt="${photo.title}" class="edit-preview-img">
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/edit/{id}(id=${photo.id})}" th:object="${editRequest}" method="post">

                <div class="form-group">
                    <label class="form-label" for="title">Title</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}"
                           placeholder="Photo title" required>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="form-error"></p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" class="form-control" th:field="*{description}" rows="4"
                              placeholder="Optional description..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/view/{id}(id=${photo.id})}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>

</body>
</html>
