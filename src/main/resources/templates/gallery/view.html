<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${photo.title}">Photo</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">Photons</a>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="page-sm">

    <a th:href="@{/}" class="back-link">&larr; Back to gallery</a>

    <div class="photo-view-img-wrap">
        <img th:src="${photo.imageUrl}" th:alt="${photo.title}" class="photo-view-img">
    </div>

    <div class="card" style="margin-top: 20px">
        <div class="card-body">

            <h1 class="photo-view-title" th:text="${photo.title}">Title</h1>

            <div class="photo-meta">
                <span th:text="'Uploaded ' + ${#temporals.format(photo.createdAt, 'MMM d, yyyy')}"></span>
                <span th:if="${photo.updatedAt != null and photo.updatedAt != photo.createdAt}"
                      th:text="'Updated ' + ${#temporals.format(photo.updatedAt, 'MMM d, yyyy')}"></span>
            </div>

            <p class="photo-view-description"
               th:if="${photo.description != null and !photo.description.isEmpty()}"
               th:text="${photo.description}"></p>

            <p class="photo-view-description" style="color:var(--gray-400); font-style:italic"
               th:if="${photo.description == null or photo.description.isEmpty()}">No description provided.</p>

            <div class="photo-detail-actions">
                <a th:href="@{/edit/{id}(id=${photo.id})}" class="btn btn-secondary">Edit</a>
                <button type="button" class="btn btn-danger"
                        th:data-action="@{/delete/{id}(id=${photo.id})}"
                        th:data-title="${photo.title}"
                        onclick="openDeleteModal(this)">Delete</button>
            </div>

        </div>
    </div>

</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <p class="modal-title">Delete Photo?</p>
        <p class="modal-text" id="deleteModalText">This will permanently remove the photo and cannot be undone.</p>
        <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <form id="deleteForm" method="post">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var successMessage = /*[[${successMessage}]]*/ null;

    function showToast(msg, type) {
        var c = document.getElementById('toastContainer');
        var t = document.createElement('div');
        t.className = 'toast toast-' + (type || 'success');
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(function() {
            t.style.animation = 'toast-out .3s ease forwards';
            setTimeout(function() { t.remove(); }, 300);
        }, 3000);
    }
    if (successMessage) showToast(successMessage);

    var overlay = document.getElementById('deleteModal');
    function openDeleteModal(btn) {
        document.getElementById('deleteModalText').textContent =
            '"' + btn.dataset.title + '" will be permanently deleted. This cannot be undone.';
        document.getElementById('deleteForm').action = btn.dataset.action;
        overlay.classList.add('open');
    }
    function closeDeleteModal() { overlay.classList.remove('open'); }
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeDeleteModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDeleteModal(); });
</script>

</body>
</html>
