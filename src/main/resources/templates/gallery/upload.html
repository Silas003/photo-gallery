<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Photo</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">Photo Gallery</a>
</nav>

<div class="page-sm">

    <a th:href="@{/}" class="back-link">&larr; Back to gallery</a>

    <div class="page-header">
        <h1 class="page-title">Upload Photo</h1>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/upload}" th:object="${photoRequest}" method="post"
                  enctype="multipart/form-data" id="uploadForm">

                <div class="form-group">
                    <label class="form-label">Image</label>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone-content" id="uploadPlaceholder">
                            <div class="upload-icon">&#128444;</div>
                            <p class="upload-hint">Click or drag &amp; drop an image</p>
                            <p class="form-hint">JPG, PNG, GIF, WEBP &mdash; max 10 MB</p>
                        </div>
                        <img id="imagePreview" class="upload-preview" alt="Preview" style="display:none">
                        <input type="file" id="imageInput" name="image" accept="image/*"
                               class="upload-file-input" required>
                    </div>
                    <p id="fileError" class="form-error" style="display:none"></p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="title">Title</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}"
                           placeholder="Give your photo a title" maxlength="120" required>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="form-error"></p>
                    <p class="char-counter" id="titleCounter">0 / 120</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" class="form-control" th:field="*{description}" rows="4"
                              maxlength="1000" placeholder="Optional description..."></textarea>
                    <p class="char-counter" id="descCounter">0 / 1000</p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Upload Photo</button>
                    <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>

<script>
    var zone = document.getElementById('uploadZone');
    var input = document.getElementById('imageInput');
    var preview = document.getElementById('imagePreview');
    var placeholder = document.getElementById('uploadPlaceholder');
    var fileError = document.getElementById('fileError');

    var ALLOWED = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    var MAX_BYTES = 10 * 1024 * 1024;

    function validateAndPreview(file) {
        if (ALLOWED.indexOf(file.type) === -1) {
            fileError.textContent = 'Only JPG, PNG, GIF, and WEBP files are allowed.';
            fileError.style.display = 'block';
            input.value = '';
            return;
        }
        if (file.size > MAX_BYTES) {
            fileError.textContent = 'File is too large. Maximum size is 10 MB.';
            fileError.style.display = 'block';
            input.value = '';
            return;
        }
        fileError.style.display = 'none';
        var reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    input.addEventListener('change', function() {
        if (input.files[0]) validateAndPreview(input.files[0]);
    });

    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        var file = e.dataTransfer.files[0];
        if (file) {
            var dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            validateAndPreview(file);
        }
    });

    function charCounter(el, counterId, max) {
        var counter = document.getElementById(counterId);
        function update() {
            var len = el.value.length;
            counter.textContent = len + ' / ' + max;
            counter.className = 'char-counter' + (len >= max ? ' at-limit' : len >= max * 0.9 ? ' near-limit' : '');
        }
        el.addEventListener('input', update);
        update();
    }
    charCounter(document.getElementById('title'), 'titleCounter', 120);
    charCounter(document.getElementById('description'), 'descCounter', 1000);

    document.getElementById('uploadForm').addEventListener('submit', function() {
        if (!input.files.length) return;
        var btn = document.getElementById('submitBtn');
        btn.classList.add('btn-loading');
        btn.textContent = 'Uploading...';
    });
</script>

</body>
</html>
